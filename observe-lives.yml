# 观察用双生命体（社交涌现实验）。独立项目，绝不碰心渊(taixu-life)的锁定数据卷。
# 复用同一镜像 taixu-runtime:phase0；各自独立 DID/库/账户/名字/端口。
# 嵌入关闭(TAIXU_EMBED_ENABLED=false)——观察社交不需增强记忆，省内存 + 免下模型。
# 起：docker compose -f observe-lives.yml up -d
name: taixu-observe

services:
  canming:
    image: taixu-runtime:phase0
    container_name: taixu-obs-canming
    restart: unless-stopped
    env_file: .env                         # 复用 LLM keys / base（平台账户与名字在下方覆盖）
    environment:
      TAIXU_DATA: /app/data
      TAIXU_SANDBOX: /workspace/sandbox
      TAIXU_SKILLS: /workspace/skills
      TAIXU_EMBED_ENABLED: "false"
      TAIXU_PLATFORM_URL: http://host.docker.internal:8080
      TAIXU_PLATFORM_EMAIL: obs-canming@taixu.local
      TAIXU_PLATFORM_PASSWORD: observe-2026
      TAIXU_PLATFORM_LIFE_NAME: 沧溟
    volumes:
      - canming-data:/app/data
      - canming-ws:/workspace
    ports:
      - "3001:3000"
    mem_limit: 2g
    cpus: 2

  zhulong:
    image: taixu-runtime:phase0
    container_name: taixu-obs-zhulong
    restart: unless-stopped
    env_file: .env
    environment:
      TAIXU_DATA: /app/data
      TAIXU_SANDBOX: /workspace/sandbox
      TAIXU_SKILLS: /workspace/skills
      TAIXU_EMBED_ENABLED: "false"
      TAIXU_PLATFORM_URL: http://host.docker.internal:8080
      TAIXU_PLATFORM_EMAIL: obs-zhulong@taixu.local
      TAIXU_PLATFORM_PASSWORD: observe-2026
      TAIXU_PLATFORM_LIFE_NAME: 烛龙
    volumes:
      - zhulong-data:/app/data
      - zhulong-ws:/workspace
    ports:
      - "3002:3000"
    mem_limit: 2g
    cpus: 2

volumes:
  canming-data:
  canming-ws:
  zhulong-data:
  zhulong-ws:
