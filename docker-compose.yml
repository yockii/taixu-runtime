# Mindverse Phase 0.1 docker-compose
#
# data 用 named volume：Windows bind-mount 对 SQLite 文件锁支持极差（IO err 4618 / 持久 Windows
# 文件锁），data 库驻 WSL2 VM 内即可消除。
#
# workspace 是生命体的"工作目录"，bind-mount 到宿主 ./workspace/，作者可直观查看 / 投放：
#   ./workspace/sandbox/   生命体 fs.* 写出的文件（笔记 / 草稿等）
#   ./workspace/skills/    每个子文件夹 = 一个 skill（Anthropic 规范：SKILL.md + 脚本 / ref）
#                          作者把 skill 文件夹丢进来，boot 扫描或 rescan 即装载。

services:
  runtime:
    build:
      context: .
      dockerfile: Dockerfile
    image: mindverse-runtime:phase0
    container_name: mindverse-phase0
    restart: unless-stopped
    env_file: .env
    environment:
      MINDVERSE_DATA: /app/data
      MINDVERSE_SANDBOX: /workspace/sandbox
      MINDVERSE_SKILLS: /workspace/skills
      # 嵌入服务（Qwen3-Embedding-0.6B，docs/TECH-STACK §5）的容器内地址。
      # 关键：runtime 不 depends_on embed 健康——embed 不可达时 runtime 优雅降级
      # （向量留空 / 检索回退关键词召回），生命体绝不因嵌入失败而阻塞或崩溃。
      MINDVERSE_EMBED_URL: http://embed:11435
      MINDVERSE_EMBED_MODEL: qwen3-embedding-0.6b
    volumes:
      - mindverse-data:/app/data
      - ./workspace:/workspace
    ports:
      - "3000:3000"
    mem_limit: 6g
    cpus: 3
    # 故意不写 depends_on: embed —— 强耦合会让 embed 拉不起时拖垮 runtime。
    # embed 是可后补的旁路服务，runtime 先起来照常活着。

  # ----------------------------------------------------------------------------
  # 嵌入服务：llama.cpp server 跑 Qwen3-Embedding-0.6B GGUF，暴露 OpenAI 兼容
  # /v1/embeddings。独立服务、可后补、可单独重启，不影响 runtime（见上注释）。
  #
  # GGUF 放置（二选一）：
  #   A) 卷挂载（推荐 / CN 网络友好）：手动把 GGUF 下到宿主 ./models/，挂进容器。
  #      下载（任选其一镜像源）：
  #        huggingface-cli download Qwen/Qwen3-Embedding-0.6B-GGUF \
  #          Qwen3-Embedding-0.6B-Q8_0.gguf --local-dir ./models
  #        # CN 加速：HF_ENDPOINT=https://hf-mirror.com 前缀，或 modelscope 下同名 GGUF。
  #      然后把下方 command 里的文件名对齐（Q8_0 ≈ 639MB / Q4_K_M ≈ 397MB）。
  #   B) 首启容器内下载：换一个带下载脚本的入口（需容器能联网 / 配代理），不在此默认。
  #
  # 无 GGUF / 服务起不来都没关系：runtime 会降级，等 GGUF 备齐再 `docker compose up -d embed`。
  embed:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: mindverse-embed
    restart: unless-stopped
    volumes:
      - ./models:/models:ro
    command: >
      --host 0.0.0.0 --port 11435
      --embedding --pooling last
      -m /models/Qwen3-Embedding-0.6B-Q8_0.gguf
      --ctx-size 8192 --batch-size 8192
    # 仅容器内 runtime 调用，无需对宿主开端口；如需本机调试再加 ports: ["11435:11435"]。
    mem_limit: 2g
    cpus: 2

volumes:
  mindverse-data:
    name: mindverse-data
