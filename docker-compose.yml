# Mindverse Phase 0.1 docker-compose
#
# data 用 named volume：Windows bind-mount 对 SQLite 文件锁支持极差（IO err 4618 / 持久 Windows
# 文件锁），data 库驻 WSL2 VM 内即可消除。
#
# workspace 是生命体的"工作目录"，bind-mount 到宿主 ./workspace/，作者可直观查看 / 投放：
#   ./workspace/sandbox/   生命体 fs.* 写出的文件（笔记 / 草稿等）
#   ./workspace/skills/    每个子文件夹 = 一个 skill（Anthropic 规范：SKILL.md + 脚本 / ref）
#                          作者把 skill 文件夹丢进来，boot 扫描或 rescan 即装载。

services:
  runtime:
    build:
      context: .
      dockerfile: Dockerfile
    image: taixu-runtime:phase0
    container_name: taixu-life
    restart: unless-stopped
    # 日志轮转（长跑保活，2026-06-12 硬盘审计）：json-file 默认无界 → 长 uptime 撑爆盘。夹到 30MB/容器。
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    # 上线后走真实 DNS（api.taixu.icu → CF → Mac 隧道）。本机联调如需指回本地 gateway，
    # 临时加回 extra_hosts: ["api.taixu.icu:host-gateway"] 即可，无需改码。
    env_file: .env
    environment:
      TAIXU_DATA: /app/data
      TAIXU_SANDBOX: /workspace/sandbox
      TAIXU_SKILLS: /workspace/skills
      # 观察轮一律关增强记忆（用户决策）：嵌入模型首次下载耗时长 + 占带宽，观察社交不需要。
      TAIXU_EMBED_ENABLED: "false"
      # 嵌入服务（Qwen3-Embedding-0.6B，docs/TECH-STACK §5）现为「面板自管」：
      # llama-server 随 runtime 镜像分发，由 runtime 以子进程拉起（见 internal/runtime/embedsvc）。
      # 用户在 :3000 控制面勾选「嵌入增强记忆」即按需下载模型 + 启动，全程优雅降级、开关持久化。
      # 模型下到数据卷 /app/data/models/，无需独立容器。
      #
      # 高级 / 兼容：若要指向「外部 embed 容器」，设 TAIXU_EMBED_URL（设了则面板开关让位给外部）。
      # TAIXU_EMBED_URL: http://embed:11435
    volumes:
      # ⚠️ 卷名保留 mindverse-data：本机已存心渊数据，改名=孤立卷需迁移。
      # TODO 下次完整重建(无数据)时改 taixu-data。
      - mindverse-data:/app/data
      - ./workspace:/workspace
    ports:
      - "3000:3000"
    # 内含 llama-server 嵌入子进程（启用时约 +1.5GB 常驻）→ 比纯 runtime 上调到 8g。
    mem_limit: 8g
    cpus: 4

volumes:
  mindverse-data:
    name: mindverse-data
