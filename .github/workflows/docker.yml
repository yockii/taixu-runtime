name: docker

# 推 tag v* 出多架构 Docker 镜像（linux/amd64 + linux/arm64）并推 Docker Hub。
# 用 GitHub 原生 runner 各架构分别构建（arm64 走免费的 ubuntu-24.04-arm，避 QEMU 模拟），
# 按 digest 推送后在 merge job 合成单一 multi-arch manifest（yockii/taixu:<tag> + :latest）。
#
# 需在仓库 Settings → Secrets 配置：
#   DOCKERHUB_USERNAME  — Docker Hub 用户名（yockii）
#   DOCKERHUB_TOKEN     — Docker Hub Access Token（read/write/delete 权限）
#
# 裸二进制（含 llama.cpp 嵌入 + chromium）由 release.yml 单独产出；本工作流只管 Docker 镜像。

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  IMAGE: yockii/taixu

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 各架构原生构建，按 digest 推送（不打 tag，tag 留给 merge 合成 manifest）。
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1
          if-no-files-found: error

  merge:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # tag 来源：推 tag v0.3.0 → 同名版本 tag + latest；手动触发 → 仅 latest。
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      # 把各架构 digest 合成单一 multi-arch manifest，逐 tag 推送。
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Inspect
        run: docker buildx imagetools inspect ${{ env.IMAGE }}:latest
